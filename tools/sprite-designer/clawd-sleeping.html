<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawd Sleeping Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 4px; color: #993d1a; }
.subtitle { font-size: 11px; color: #666; margin-bottom: 16px; }
.controls { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
button {
  padding: 6px 14px; background: #2a2a4e; color: #eee; border: 1px solid #444;
  border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px;
}
button:hover { background: #3a3a5e; }
button.primary { background: #993d1a; border-color: #993d1a; color: #fff; }
button.primary:hover { background: #aa4e2b; }
#preview-section { text-align: center; margin-bottom: 20px; }
#preview-section h3 { font-size: 12px; color: #666; margin-bottom: 6px; }
#preview-canvas { image-rendering: pixelated; border: 1px solid #333; background: #1a1a2e; }
.frames { display: flex; gap: 12px; flex-wrap: wrap; }
.frame-card { text-align: center; }
.frame-card canvas { image-rendering: pixelated; border: 1px solid #333; display: block; }
.frame-label { font-size: 10px; color: #666; margin-top: 4px; max-width: 128px; }
</style>
</head>
<body>

<h1>Clawd Sleeping Animation</h1>
<p class="subtitle">6 frames, 64x64, shell #993d1a, bg #1a1a2e</p>

<div class="controls">
  <button onclick="togglePlay()" id="play-btn">Play</button>
  <span style="font-size:11px; color:#666;" id="fps-label">5 FPS</span>
  <div style="flex:1;"></div>
  <button class="primary" onclick="exportAll()">Export All PNGs</button>
</div>

<div id="preview-section">
  <h3>Preview (4x)</h3>
  <canvas id="preview-canvas" width="256" height="256"></canvas>
</div>

<div class="frames" id="frame-grid"></div>

<script>
const W = 64, H = 64;
const BG = '#1a1a2e';
const SHELL = '#993d1a';
const EYES_OPEN = '#000000';
const EYES_CLOSED = '#555555';
const Z_BLUE = '#7777bb';
const Z_LIGHT = '#9999cc';
const Z_MUTED = '#5555aa';

function drawRect(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawPixel(ctx, x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}

function drawSleepingBody(ctx, yo) {
  drawRect(ctx, 0, 0, W, H, BG);
  drawRect(ctx, 17, 26 + yo, 30, 14, SHELL);
  drawPixel(ctx, 17, 26 + yo, BG);
  drawPixel(ctx, 46, 26 + yo, BG);
  drawPixel(ctx, 17, 39 + yo, BG);
  drawPixel(ctx, 46, 39 + yo, BG);
  drawRect(ctx, 14, 30 + yo, 3, 4, SHELL);
  drawRect(ctx, 47, 30 + yo, 3, 4, SHELL);
  [20, 25, 37, 42].forEach(lx => {
    drawRect(ctx, lx, 40 + yo, 2, 2, SHELL);
  });
}

function drawEyesOpen(ctx, yo) {
  drawRect(ctx, 25, 30 + yo, 2, 2, EYES_OPEN);
  drawRect(ctx, 37, 30 + yo, 2, 2, EYES_OPEN);
}

function drawEyesClosed(ctx, yo) {
  drawRect(ctx, 25, 31 + yo, 2, 1, EYES_CLOSED);
  drawRect(ctx, 37, 31 + yo, 2, 1, EYES_CLOSED);
}

function drawZ(ctx, x, y, color) {
  drawPixel(ctx, x, y, color);
  drawPixel(ctx, x + 1, y, color);
  drawPixel(ctx, x + 1, y + 1, color);
  drawPixel(ctx, x + 1, y + 2, color);
  drawPixel(ctx, x + 2, y + 2, color);
}

function drawSmallZ(ctx, x, y, color) {
  drawPixel(ctx, x, y, color);
  drawPixel(ctx, x + 1, y + 1, color);
}

const frameSpecs = [
  { label: '1: Curled up, eyes open', yo: 0, eyes: 'open' },
  { label: '2: Eyes closed (lines)', yo: 0, eyes: 'closed' },
  { label: '3: Breathe out (-1px)', yo: 1, eyes: 'closed' },
  { label: '4: Breathe in (+1px), z', yo: -1, eyes: 'closed', z: [44, 18, Z_BLUE] },
  { label: '5: z floats up, lighter', yo: -1, eyes: 'closed', z: [44, 16, Z_LIGHT] },
  { label: '6: Small z near body', yo: 0, eyes: 'closed', smallZ: [43, 22, Z_MUTED] },
];

function drawFrame(ctx, spec) {
  drawSleepingBody(ctx, spec.yo);
  if (spec.eyes === 'open') drawEyesOpen(ctx, spec.yo);
  else drawEyesClosed(ctx, spec.yo);
  if (spec.z) drawZ(ctx, spec.z[0], spec.z[1], spec.z[2]);
  if (spec.smallZ) drawSmallZ(ctx, spec.smallZ[0], spec.smallZ[1], spec.smallZ[2]);
}

const frameCanvases = [];

function buildFrames() {
  const container = document.getElementById('frame-grid');
  frameSpecs.forEach((spec, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = '128px';
    canvas.style.height = '128px';
    const ctx = canvas.getContext('2d');
    drawFrame(ctx, spec);
    frameCanvases.push(canvas);

    const card = document.createElement('div');
    card.className = 'frame-card';
    const label = document.createElement('div');
    label.className = 'frame-label';
    label.textContent = spec.label;
    card.appendChild(canvas);
    card.appendChild(label);
    container.appendChild(card);
  });
}

let playing = false;
let interval = null;
let currentFrame = 0;

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  if (playing) {
    btn.textContent = 'Stop';
    interval = setInterval(() => {
      currentFrame = (currentFrame + 1) % frameCanvases.length;
      renderPreview();
    }, 200);
  } else {
    btn.textContent = 'Play';
    clearInterval(interval);
  }
}

function renderPreview() {
  const pc = document.getElementById('preview-canvas');
  const pctx = pc.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  pctx.clearRect(0, 0, 256, 256);
  pctx.drawImage(frameCanvases[currentFrame], 0, 0, 256, 256);
}

function exportAll() {
  frameCanvases.forEach((canvas, i) => {
    setTimeout(() => {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'frame_' + String(i).padStart(2, '0') + '.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }, i * 150);
  });
}

buildFrames();
renderPreview();
</script>
</body>
</html>
