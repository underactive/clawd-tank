<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE Icon (Bluetooth Rune)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 4px; color: #4466aa; }
.subtitle { font-size: 11px; color: #666; margin-bottom: 16px; }
.controls { margin-bottom: 16px; }
button {
  padding: 6px 14px; background: #2a2a4e; color: #eee; border: 1px solid #444;
  border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px;
}
button:hover { background: #3a3a5e; }
button.primary { background: #4466aa; border-color: #4466aa; color: #fff; }
button.primary:hover { background: #5577bb; }
.display { display: flex; gap: 24px; align-items: flex-start; }
.view { text-align: center; }
.view h3 { font-size: 12px; color: #666; margin-bottom: 6px; }
.view canvas { image-rendering: pixelated; border: 1px solid #333; background: #1a1a2e; display: block; }
</style>
</head>
<body>

<h1>BLE Icon (Bluetooth Rune)</h1>
<p class="subtitle">16x16, #4466aa on #1a1a2e</p>

<div class="controls">
  <button class="primary" onclick="exportPNG()">Export PNG</button>
</div>

<div class="display">
  <div class="view">
    <h3>1x (16px)</h3>
    <canvas id="canvas-1x" width="16" height="16" style="width:16px;height:16px;"></canvas>
  </div>
  <div class="view">
    <h3>4x (64px)</h3>
    <canvas id="canvas-4x" width="64" height="64" style="width:64px;height:64px;"></canvas>
  </div>
  <div class="view">
    <h3>16x (256px)</h3>
    <canvas id="canvas-16x" width="256" height="256" style="width:256px;height:256px;"></canvas>
  </div>
</div>

<script>
const BG = '#1a1a2e';
const BLE = '#4466aa';

const btPixels = [
  [8,2],[8,3],[8,4],[8,5],[8,6],[8,7],
  [8,8],[8,9],[8,10],[8,11],[8,12],
  [9,3],[10,4],[11,5],
  [10,6],[9,7],
  [9,11],[10,10],[11,9],
  [10,8],
  [5,5],[6,6],[7,7],
  [5,9],[6,8],
];

function drawIcon(ctx) {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, 16, 16);
  ctx.fillStyle = BLE;
  btPixels.forEach(([x, y]) => {
    ctx.fillRect(x, y, 1, 1);
  });
}

function drawScaled(srcCanvas, destCanvas) {
  const dctx = destCanvas.getContext('2d');
  dctx.imageSmoothingEnabled = false;
  dctx.clearRect(0, 0, destCanvas.width, destCanvas.height);
  dctx.drawImage(srcCanvas, 0, 0, destCanvas.width, destCanvas.height);
}

function exportPNG() {
  const c = document.getElementById('canvas-1x');
  c.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'frame_00.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

const c1x = document.getElementById('canvas-1x');
drawIcon(c1x.getContext('2d'));
drawScaled(c1x, document.getElementById('canvas-4x'));
drawScaled(c1x, document.getElementById('canvas-16x'));
</script>
</body>
</html>
