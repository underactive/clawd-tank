<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawd Disconnected Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: monospace; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 4px; color: #ff6b2b; }
.subtitle { font-size: 11px; color: #666; margin-bottom: 16px; }
.controls { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
button {
  padding: 6px 14px; background: #2a2a4e; color: #eee; border: 1px solid #444;
  border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px;
}
button:hover { background: #3a3a5e; }
button.primary { background: #ff6b2b; border-color: #ff6b2b; color: #fff; }
button.primary:hover { background: #ff8844; }
#preview-section { text-align: center; margin-bottom: 20px; }
#preview-section h3 { font-size: 12px; color: #666; margin-bottom: 6px; }
#preview-canvas { image-rendering: pixelated; border: 1px solid #333; background: #1a1a2e; }
.frames { display: flex; gap: 12px; flex-wrap: wrap; }
.frame-card { text-align: center; }
.frame-card canvas { image-rendering: pixelated; border: 1px solid #333; display: block; }
.frame-label { font-size: 10px; color: #666; margin-top: 4px; max-width: 128px; }
</style>
</head>
<body>

<h1>Clawd Disconnected Animation</h1>
<p class="subtitle">6 frames, 64x64, shell #ff6b2b, bg #1a1a2e</p>

<div class="controls">
  <button onclick="togglePlay()" id="play-btn">Play</button>
  <span style="font-size:11px; color:#666;">5 FPS</span>
  <div style="flex:1;"></div>
  <button class="primary" onclick="exportAll()">Export All PNGs</button>
</div>

<div id="preview-section">
  <h3>Preview (4x)</h3>
  <canvas id="preview-canvas" width="256" height="256"></canvas>
</div>

<div class="frames" id="frame-grid"></div>

<script>
const W = 64, H = 64;
const BG = '#1a1a2e';
const SHELL = '#ff6b2b';
const EYES = '#000000';
const Q_YELLOW = '#ffdd57';
const Q_FADED = '#887744';

function drawRect(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawPixel(ctx, x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}

function drawNormalBody(ctx, xo) {
  drawRect(ctx, 0, 0, W, H, BG);
  drawRect(ctx, 18 + xo, 23, 28, 18, SHELL);
  drawPixel(ctx, 18 + xo, 23, BG);
  drawPixel(ctx, 45 + xo, 23, BG);
  drawPixel(ctx, 18 + xo, 40, BG);
  drawPixel(ctx, 45 + xo, 40, BG);
  drawRect(ctx, 14 + xo, 27, 4, 4, SHELL);
  drawRect(ctx, 46 + xo, 27, 4, 4, SHELL);
  [21, 26, 36, 41].forEach(lx => {
    drawRect(ctx, lx + xo, 41, 2, 5, SHELL);
  });
}

function drawEyes(ctx, exOff, eyOff, xo) {
  drawRect(ctx, 25 + exOff + xo, 28 + eyOff, 2, 2, EYES);
  drawRect(ctx, 37 + exOff + xo, 28 + eyOff, 2, 2, EYES);
}

function drawQuestion(ctx, x0, y0, color) {
  drawPixel(ctx, x0 + 1, y0, color);
  drawPixel(ctx, x0, y0 + 1, color);
  drawPixel(ctx, x0 + 2, y0 + 1, color);
  drawPixel(ctx, x0 + 2, y0 + 2, color);
  drawPixel(ctx, x0 + 1, y0 + 3, color);
}

const frameSpecs = [
  { label: '1: Neutral, eyes up-right', xo: 0, ex: 1, ey: -1 },
  { label: '2: Tilt right (+1px)', xo: 1, ex: 1, ey: -1 },
  { label: '3: Eyes look left', xo: 1, ex: -1, ey: 0 },
  { label: '4: Eyes look right (at icon)', xo: 1, ex: 1, ey: 0 },
  { label: '5: ? above head', xo: 0, ex: 1, ey: -1, q: [30, 15, Q_YELLOW] },
  { label: '6: ? fades', xo: 0, ex: 1, ey: -1, q: [30, 15, Q_FADED] },
];

function drawFrame(ctx, spec) {
  drawNormalBody(ctx, spec.xo);
  drawEyes(ctx, spec.ex, spec.ey, spec.xo);
  if (spec.q) drawQuestion(ctx, spec.q[0], spec.q[1], spec.q[2]);
}

const frameCanvases = [];

function buildFrames() {
  const container = document.getElementById('frame-grid');
  frameSpecs.forEach((spec, i) => {
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = '128px';
    canvas.style.height = '128px';
    const ctx = canvas.getContext('2d');
    drawFrame(ctx, spec);
    frameCanvases.push(canvas);

    const card = document.createElement('div');
    card.className = 'frame-card';
    const label = document.createElement('div');
    label.className = 'frame-label';
    label.textContent = spec.label;
    card.appendChild(canvas);
    card.appendChild(label);
    container.appendChild(card);
  });
}

let playing = false;
let interval = null;
let currentFrame = 0;

function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('play-btn');
  if (playing) {
    btn.textContent = 'Stop';
    interval = setInterval(() => {
      currentFrame = (currentFrame + 1) % frameCanvases.length;
      renderPreview();
    }, 200);
  } else {
    btn.textContent = 'Play';
    clearInterval(interval);
  }
}

function renderPreview() {
  const pc = document.getElementById('preview-canvas');
  const pctx = pc.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  pctx.clearRect(0, 0, 256, 256);
  pctx.drawImage(frameCanvases[currentFrame], 0, 0, 256, 256);
}

function exportAll() {
  frameCanvases.forEach((canvas, i) => {
    setTimeout(() => {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'frame_' + String(i).padStart(2, '0') + '.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }, i * 150);
  });
}

buildFrames();
renderPreview();
</script>
</body>
</html>
